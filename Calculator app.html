<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 32px;
            letter-spacing: 2px;
        }

        .calculator {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 300px;
        }

        .display {
            width: 100%;
            height: 50px;
            margin-bottom: 15px;
            font-size: 22px;
            text-align: right;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #ddd;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #667eea;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .equal {
            background: #38a169;
        }

        .equal:hover {
            background: #2f855a;
        }

        .clear {
            background: #e53e3e;
        }

        .clear:hover {
            background: #c53030;
        }
    </style>
</head>
<body>

<h1>Calculator</h1>

<div class="calculator">
    <input type="text" class="display" id="display" disabled>

    <div class="buttons">
        <button class="clear">C</button>
        <button>/</button>
        <button>*</button>
        <button>-</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>+</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>.</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="equal">=</button>

        <button style="grid-column: span 4;">0</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");
    const buttons = document.querySelectorAll("button");

    buttons.forEach(button => {
        button.addEventListener("click", function() {
            const value = this.textContent;

            if (value === "C") {
                display.value = "";
            } 
            else if (value === "=") {
                try {
                    display.value = eval(display.value);
                } catch {
                    display.value = "Error";
                }
            } 
            else {
                display.value += value;
            }
        });
    });
</script>

</body>
</html>
